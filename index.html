<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="OneTap Digital Profile"
  >

  <title>Digital Profile</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="card" id="card">

    <!-- Profile image -->
    <div class="avatar-wrap">
      <img
        id="avatar"
        class="avatar"
        src="images/default-profile.jpg"
        alt="Profile picture"
      >
    </div>

    <!-- Customer information -->
    <h1 id="name" class="name">Loading...</h1>

    <p id="job" class="job">
      Digital Profile
    </p>

    <!-- Social buttons -->
    <div class="actions" id="actions">

      <!-- WhatsApp -->
      <button
        id="whatsappBtn"
        class="btn btn-whatsapp"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.472-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>

          <path d="M12.004 2.003c-5.514 0-9.997 4.483-9.997 9.997 0 1.763.462 3.489 1.34 5.007L2 22l5.117-1.334a9.96 9.96 0 0 0 4.885 1.263h.004c5.514 0 9.997-4.483 9.997-9.997 0-2.671-1.04-5.182-2.929-7.071a9.935 9.935 0 0 0-7.07-2.858zm0 18.163h-.003a8.16 8.16 0 0 1-4.16-1.14l-.298-.177-3.036.792.81-2.96-.194-.304a8.146 8.146 0 0 1-1.25-4.373c0-4.507 3.667-8.173 8.174-8.173 2.183 0 4.235.851 5.78 2.397a8.12 8.12 0 0 1 2.393 5.782c0 4.507-3.667 8.174-8.174 8.174z"/>
        </svg>

        <span>WhatsApp</span>
      </button>

      <!-- InstaPay -->
      <button
        id="instapayBtn"
        class="btn btn-instapay"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect
            x="2"
            y="5"
            width="20"
            height="14"
            rx="3"
          />

          <path d="M2 10h20"/>
          <path d="M6 15h4"/>
        </svg>

        <span id="instapayLabel">InstaPay</span>
      </button>

      <!-- Facebook -->
      <button
        id="facebookBtn"
        class="btn btn-facebook"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M22 12.06C22 6.51 17.52 2 12 2S2 6.51 2 12.06c0 5.02 3.66 9.18 8.44 9.94v-7.03H7.9v-2.91h2.54V9.85c0-2.51 1.49-3.9 3.77-3.9 1.09 0 2.24.2 2.24.2v2.47h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.45 2.91h-2.33V22c4.78-.76 8.44-4.92 8.44-9.94z"/>
        </svg>

        <span>Facebook</span>
      </button>

      <!-- Instagram -->
      <button
        id="instagramBtn"
        class="btn btn-instagram"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect
            x="2"
            y="2"
            width="20"
            height="20"
            rx="5"
          />

          <circle
            cx="12"
            cy="12"
            r="4"
          />

          <circle
            cx="17.5"
            cy="6.5"
            r="1"
            fill="currentColor"
            stroke="none"
          />
        </svg>

        <span>Instagram</span>
      </button>

      <!-- TikTok -->
      <button
        id="tiktokBtn"
        class="btn btn-tiktok"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M16.6 5.82c-.94-.86-1.53-2.07-1.6-3.42h-3.16v13.44c0 1.6-1.3 2.9-2.9 2.9-1.6 0-2.9-1.3-2.9-2.9s1.3-2.9 2.9-2.9c.3 0 .59.05.86.13V9.9a6.13 6.13 0 0 0-.86-.06 6.13 6.13 0 1 0 6.13 6.13V9.34a8.9 8.9 0 0 0 5.13 1.63V7.8c-1.32 0-2.55-.42-3.6-1.14z"/>
        </svg>

        <span>TikTok</span>
      </button>

      <!-- X -->
      <button
        id="xBtn"
        class="btn btn-x"
        type="button"
      >
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M18.244 2H21.5l-7.5 8.57L22.75 22h-6.62l-5.18-6.77L4.98 22H1.72l8.02-9.17L1.25 2h6.79l4.68 6.19L18.244 2zm-1.16 18.02h1.83L7.02 3.88H5.06l12.02 16.14z"/>
        </svg>

        <span>X (Twitter)</span>
      </button>

    </div>

    <!-- Toast message -->
    <div
      id="toast"
      class="toast"
      role="status"
      aria-live="polite"
    >
      Copied!
    </div>

  </main>

<div class="footer">
  Powered by
  <a
    href="https://www.tiktok.com/@bs_store15?is_from_webapp=1&sender_device=pc"
    target="_blank"
    rel="noopener noreferrer"
  >
    B&amp;S
  </a>
</div>

  <script src="script.js"></script>
</body>
</html>
